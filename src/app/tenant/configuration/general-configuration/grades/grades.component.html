<section class="sk-page">
  <div class="sk-page__panel">
    <div class="sk-toolbar sk-page__toolbar">
      <div class="sk-toolbar__left">
        @if (getScreenOption('add'); as addOption) {
          <app-ui-button
            [label]="addOption.translation | translate"
            [variant]="getScreenOptionVariant('add', 'primary')"
            size="sm"
            [iconLeft]="addOption.icon"
            (click)="onAdd()"
          />
        }
      </div>

      <div class="sk-toolbar__center">
        @if (hasSingleSelection()) {
          <div class="sk-selection-inline">
            <span class="sk-selection-badge">1</span>
            <strong>{{ selectedGrades()[0].name }}</strong>
          </div>
        } @else if (level()) {
          <div class="sk-selection-inline">
            <strong>{{ level()?.name }}</strong>
          </div>
        }
      </div>

      <div class="sk-toolbar__right">
        @if (hasSingleSelection()) {
          @if (getScreenOption('update'); as updateOption) {
            <app-ui-button
              [iconLeft]="updateOption.icon"
              [variant]="getScreenOptionVariant('update')"
              size="sm"
              [iconOnly]="true"
              [title]="updateOption.translation | translate"
              (click)="onEdit()"
            />
          }

          @if (getScreenOption('delete'); as deleteOption) {
            <app-ui-button
              [iconLeft]="deleteOption.icon"
              [variant]="getScreenOptionVariant('delete', 'danger')"
              size="sm"
              [iconOnly]="true"
              [title]="deleteOption.translation | translate"
              (click)="onDelete()"
            />
          }
        }
      </div>
    </div>

    <div class="sk-table-wrap">
      <app-skolans-table
        [columnDefs]="columnDefs()"
        [rowData]="grades()"
        [loading]="loading()"
        selectionMode="single"
        [emptyMessage]="'configuration.grades.messages.empty' | translate"
        height="fill"
        [pagination]="true"
        [alwaysShowPagination]="true"
        [pageSize]="10"
        [getRowId]="getRowId"
        (selectionChange)="onSelectionChange($event)"
      ></app-skolans-table>
    </div>
  </div>
</section>

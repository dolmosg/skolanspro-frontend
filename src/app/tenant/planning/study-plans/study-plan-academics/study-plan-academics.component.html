<section class="study-plan-academics">
  @if (selectedIntegrationStageId()) {
    <app-stage-integrations
      class="study-plan-academics__stage-view"
      [stageId]="selectedIntegrationStageId()"
      [route]="childRoute(integrationsChild()?.name)"
      (back)="closeIntegrations()"
    />
  } @else if (selectedSubjectStageId()) {
    <app-study-plan-stage-subjects
      class="study-plan-academics__stage-view"
      [stageId]="selectedSubjectStageId()"
      [initialGradeId]="selectedSubjectGradeId()"
      [route]="childRoute(subjectsChild()?.name)"
      (back)="closeStageSubjects()"
    />
  } @else if (selectedStageId()) {
    <app-study-plan-stage
      class="study-plan-academics__stage-view"
      [stageId]="selectedStageId()"
      [route]="childRoute(stagesChild()?.name)"
      (back)="closeStage()"
    />
  } @else {
    <header class="study-plan-academics__header">
      <div>
        <h3>{{ 'planning.study-plan-academics.title' | translate }}</h3>
        <p>{{ 'planning.study-plan-academics.description' | translate }}</p>
      </div>
    </header>

    <div class="study-plan-academics__grid">
      <app-study-plan-stages-summary
        [stages]="stages()"
        [child]="stagesChild()"
        [addStageOption]="getScreenOption('add-stage')"
        [expectedStagesCount]="academicPlan()?.structure?.stages ?? null"
        (stageSelected)="openStage($event)"
        (addStage)="openAddStage()"
      />

      <app-study-plan-subjects-summary
        [stages]="stages()"
        [grades]="grades()"
        [child]="subjectsChild()"
        (stageGradeSelected)="openStageGradeSubjects($event)"
        (stageCrossoversSelected)="openStageCrossovers($event)"
      />

      <app-study-plan-integrations-summary
        [stages]="stages()"
        (openStageIntegrations)="openIntegrations($event.stageId)"
      />
    </div>
  }
</section>

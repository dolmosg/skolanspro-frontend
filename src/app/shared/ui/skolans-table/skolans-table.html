<section class="skolans-table">
  @if (renderGrid()) {
    <ag-grid-angular
      #grid
      class="ag-theme-alpine skolans-table__grid"
      [style.width]="tableStyle.width"
      [style.height]="tableStyle.height"
      [columnDefs]="columnDefs"
      [rowData]="rowData"
      [localeText]="localeText"
      [pagination]="pagination"
      [paginationPageSize]="effectivePageSize"
      [paginationPageSizeSelector]="paginationPageSizeSelector"
      [suppressPaginationPanel]="!pagination && !alwaysShowPagination"
      [domLayout]="'normal'"
      [defaultColDef]="defaultColDef"
      [rowSelection]="rowSelection()"
      [overlayNoRowsTemplate]="emptyMessage | translate"
      [overlayLoadingTemplate]="loadingOverlayTemplate"
      (gridReady)="onGridReady($event)"
      (selectionChanged)="onSelectionChanged($event)"
      (rowClicked)="onRowClicked($event)"
      (rowDragEnd)="onRowDragEnd($event)"
      (rowDragMove)="onRowDragMove($event)"
    ></ag-grid-angular>
  }
</section>

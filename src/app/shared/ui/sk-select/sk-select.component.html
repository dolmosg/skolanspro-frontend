<ng-select
  [items]="resolvedItems()"
  [bindLabel]="bindLabel()"
  [bindValue]="bindValue()"
  [formControl]="control()"
  [searchable]="searchable()"
  [clearable]="clearable()"
  [disabled]="disabled()"
  [placeholder]="resolvedPlaceholder() | translate"
  appendTo="body"
>
  @if (translateLabel()) {
    <ng-template ng-label-tmp let-item="item">
      {{ item[bindLabel()] | translate }}
    </ng-template>
    <ng-template ng-option-tmp let-item="item">
      {{ item[bindLabel()] | translate }}
    </ng-template>
  }
</ng-select>

<header class="topbar">
  <div class="topbar__left">
    <button
      type="button"
      class="topbar__menu-btn"
      aria-label="Alternar menú"
      (click)="onMenuClick()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="topbar__heading">
      <app-breadcrumb></app-breadcrumb>
    </div>
  </div>

  <div class="topbar__right">
    <div class="topbar__dropdown">
      <button
        type="button"
        class="topbar__action-btn topbar__action-btn--language"
        (click)="onLanguageClick()"
        [attr.title]="'Cambiar idioma'"
        [attr.aria-expanded]="languageMenuOpen()"
        aria-haspopup="menu"
      >
        {{ currentLanguageLabel }}
        <span class="topbar__chevron">▾</span>
      </button>

      @if (languageMenuOpen()) {
        <div class="topbar__menu" role="menu">
          @for (language of availableLanguages(); track language.value) {
            <button
              type="button"
              class="topbar__menu-item"
              [class.topbar__menu-item--active]="language.value === currentLanguage"
              (click)="selectLanguage(language.value)"
              role="menuitem"
            >
              {{ language.label | translate }}
            </button>
          }
        </div>
      }
    </div>

    <button
      type="button"
      class="topbar__icon-btn"
      aria-label="Notificaciones"
      (click)="onNotificationsClick()"
    >
      <app-ui-icon name="notifications" size="sm" />
      @if (notificationsCount > 0) {
        <span class="topbar__badge">{{ notificationsCount }}</span>
      }
    </button>

    @if (canSwitchRoles()) {
      <div class="topbar__dropdown">
        <button
          type="button"
          class="topbar__action-btn topbar__action-btn--role"
          (click)="onRoleClick()"
          [attr.title]="'layout.topbar.change_role' | translate"
          [attr.aria-expanded]="roleMenuOpen()"
          aria-haspopup="menu"
        >
          <app-ui-icon name="role-switch" size="sm" />
          <span class="topbar__role-label">{{ currentRoleComputed() }}</span>
          <span class="topbar__chevron">▾</span>
        </button>

        @if (roleMenuOpen()) {
          <div class="topbar__menu topbar__menu--roles" role="menu">
            @for (role of rolesComputed(); track role.value) {
              <button
                type="button"
                class="topbar__menu-item topbar__menu-item--role"
                [class.topbar__menu-item--active]="role.label === currentRoleComputed()"
                (click)="selectRole(role.value)"
                role="menuitem"
              >
                <span class="topbar__menu-item-icon">
                  <app-ui-icon name="role-switch" size="sm" />
                </span>
                <span class="topbar__menu-item-label">{{ role.label }}</span>
              </button>
            }
          </div>
        }
      </div>
    }

    <div class="topbar__dropdown">
      <button
        type="button"
        class="topbar__user-btn"
        aria-label="Usuario"
        (click)="onUserClick()"
        [attr.aria-expanded]="userMenuOpen()"
        aria-haspopup="menu"
      >
        @if (hasUserPicture()) {
          <img
            class="topbar__user-avatar"
            [src]="resolvedUserPicture()!"
            [alt]="resolvedUserName() || 'Avatar del usuario'"
          />
        } @else {
          <span class="topbar__user-initials" aria-hidden="true">
            {{ userInitialsComputed() }}
          </span>
        }
      </button>

      @if (userMenuOpen()) {
        <div class="topbar__menu topbar__menu--user" role="menu">
          <button
            type="button"
            class="topbar__menu-item topbar__menu-item--user"
            (click)="onProfileClick()"
            role="menuitem"
          >
            <span class="topbar__menu-item-icon">
              <app-ui-icon name="user" size="sm" />
            </span>
            <span class="topbar__menu-item-label">Mi perfil</span>
          </button>

          <button
            type="button"
            class="topbar__menu-item topbar__menu-item--user"
            (click)="onLogoutClick()"
            role="menuitem"
          >
            <span class="topbar__menu-item-icon">
              <app-ui-icon name="logout" size="sm" />
            </span>
            <span class="topbar__menu-item-label">Salir</span>
          </button>
        </div>
      }
    </div>
  </div>
</header>

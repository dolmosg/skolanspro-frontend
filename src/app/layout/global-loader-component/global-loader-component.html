@if (isLoading()) {
  <div class="global-loader" aria-live="polite" aria-busy="true" role="status">
    <div class="global-loader__backdrop"></div>

    <div class="global-loader__content">
      <div class="global-loader__spinner" aria-hidden="true"></div>
      <p class="global-loader__text">Cargando información...</p>
    </div>
  </div>
}

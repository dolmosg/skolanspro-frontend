<form class="module-modal" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="module-modal__grid">
    <div class="module-modal__field module-modal__field--full">
      <label class="module-modal__label" for="organization-theme-name">
        {{ 'configuration.organization-themes.fields.name' | translate }}
      </label>
      <input
        #nameInput
        id="organization-theme-name"
        type="text"
        class="module-modal__input"
        formControlName="name"
        maxlength="45"
        (input)="onNameChange($any($event.target).value)"
      />
      <form-error [control]="form.controls.name"></form-error>
    </div>

    <div class="module-modal__field module-modal__field--full">
      <label class="module-modal__label" for="organization-theme-translation">
        {{ 'configuration.organization-themes.fields.translation' | translate }}
      </label>
      <input
        id="organization-theme-translation"
        type="text"
        class="module-modal__input"
        formControlName="translation"
        maxlength="128"
      />
      <form-error [control]="form.controls.translation"></form-error>
    </div>

    <div class="module-modal__field module-modal__field--inline">
      <label class="module-modal__checkbox" for="organization-theme-active">
        <input id="organization-theme-active" type="checkbox" formControlName="active" />
        <span>{{ 'configuration.organization-themes.fields.active' | translate }}</span>
      </label>
      <form-error [control]="form.controls.active"></form-error>
    </div>
  </div>

  <div modal-footer class="module-modal__actions">
    <app-ui-button
      type="button"
      variant="secondary"
      size="sm"
      [label]="'common.cancel' | translate"
      (click)="onCancel()"
    ></app-ui-button>

    <app-ui-button
      type="submit"
      variant="primary"
      size="sm"
      [label]="(isEdit() ? 'configuration.organization-themes.update' : 'configuration.organization-themes.add') | translate"
    ></app-ui-button>
  </div>
</form>

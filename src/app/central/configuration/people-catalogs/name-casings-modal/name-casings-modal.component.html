<form class="module-modal" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="module-modal__grid">
    <div class="module-modal__field module-modal__field--full">
      <label class="module-modal__label" for="name-casing-name">
        {{ 'configuration.name-casings.fields.name' | translate }}
      </label>
      <input
        #nameInput
        id="name-casing-name"
        type="text"
        class="module-modal__input"
        formControlName="name"
        maxlength="45"
        (input)="onNameChange()"
      />
      <form-error [control]="form.controls.name"></form-error>
    </div>

    <div class="module-modal__field module-modal__field--full">
      <label class="module-modal__label" for="name-casing-translation">
        {{ 'configuration.name-casings.fields.translation' | translate }}
      </label>
      <input
        id="name-casing-translation"
        type="text"
        class="module-modal__input"
        formControlName="translation"
        maxlength="128"
      />
      <form-error [control]="form.controls.translation"></form-error>
    </div>
  </div>

  <div modal-footer class="module-modal__actions">
    <app-ui-button
      type="button"
      variant="secondary"
      size="sm"
      [label]="'common.cancel' | translate"
      (click)="onCancel()"
    ></app-ui-button>

    <app-ui-button
      type="submit"
      variant="primary"
      size="sm"
      [label]="(isEdit() ? 'configuration.name-casings.update' : 'configuration.name-casings.add') | translate"
    ></app-ui-button>
  </div>
</form>

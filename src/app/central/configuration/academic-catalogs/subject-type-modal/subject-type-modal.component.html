<form class="catalog-modal" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="catalog-modal__grid">

    <!-- NAME -->
    <div class="catalog-modal__field catalog-modal__field--full">
      <label class="catalog-modal__label">
        {{ 'configuration.subject-types.fields.name' | translate }}
        <span>*</span>
      </label>

      <input
        class="catalog-modal__input"
        type="text"
        formControlName="name"
        maxlength="45"
        autocomplete="off"
        (input)="onNameChange($event)"
      />

      @if (form.controls.name.touched && form.controls.name.invalid) {
        <small class="catalog-modal__error">
          {{ 'validation.required' | translate }}
        </small>
      }
    </div>

    <!-- TRANSLATION -->
    <div class="catalog-modal__field catalog-modal__field--full">
      <label class="catalog-modal__label">
        {{ 'configuration.subject-types.fields.translation' | translate }}
      </label>

      <input
        class="catalog-modal__input"
        type="text"
        formControlName="translation"
        maxlength="200"
        autocomplete="off"
      />

      @if (form.controls.translation.touched && form.controls.translation.invalid) {
        <small class="catalog-modal__error">
          {{ 'validation.maxlength' | translate }}
        </small>
      }
    </div>

    <!-- CAN CREATE -->
    <div class="catalog-modal__field catalog-modal__field--inline">
      <label class="catalog-modal__checkbox">
        <input type="checkbox" formControlName="can_create" />
        <span>
          {{ 'configuration.subject-types.fields.can-create' | translate }}
        </span>
      </label>
    </div>

    <!-- CAN REMOVE -->
    <div class="catalog-modal__field catalog-modal__field--inline">
      <label class="catalog-modal__checkbox">
        <input type="checkbox" formControlName="can_remove" />
        <span>
          {{ 'configuration.subject-types.fields.can-remove' | translate }}
        </span>
      </label>
    </div>

    <!-- AUTOMATIC -->
    <div class="catalog-modal__field catalog-modal__field--inline">
      <label class="catalog-modal__checkbox">
        <input type="checkbox" formControlName="automatic" />
        <span>
          {{ 'configuration.subject-types.fields.automatic' | translate }}
        </span>
      </label>
    </div>

    <!-- SEARCHABLE -->
    <div class="catalog-modal__field catalog-modal__field--inline">
      <label class="catalog-modal__checkbox">
        <input type="checkbox" formControlName="searchable" />
        <span>
          {{ 'configuration.subject-types.fields.searchable' | translate }}
        </span>
      </label>
    </div>

    <!-- USES TEAMS -->
    <div class="catalog-modal__field catalog-modal__field--inline">
      <label class="catalog-modal__checkbox">
        <input type="checkbox" formControlName="uses_teams" />
        <span>
          {{ 'configuration.subject-types.fields.uses-teams' | translate }}
        </span>
      </label>
    </div>

    <!-- ACTIVE -->
    <div class="catalog-modal__field catalog-modal__field--inline">
      <label class="catalog-modal__checkbox">
        <input type="checkbox" formControlName="active" />
        <span>
          {{ 'configuration.subject-types.fields.active' | translate }}
        </span>
      </label>
    </div>

  </div>

  <footer class="catalog-modal__actions">
    <app-ui-button
      type="button"
      variant="danger"
      iconLeft="reset"
      [label]="'common.cancel' | translate"
      (click)="onCancel()"
    />

    <app-ui-button
      type="submit"
      variant="primary"
      iconLeft="save"
      [label]="'common.save' | translate"
    />
  </footer>
</form>

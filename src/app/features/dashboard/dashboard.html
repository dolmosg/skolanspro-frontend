<section class="dashboard">
  <div class="dashboard__hero">
    <div>
      <span class="dashboard__eyebrow">Plantilla base</span>
      <h2>Estamos construyendo el nuevo SkolansPro</h2>
      <p>
        Esta es la base inicial del layout. El siguiente paso será convertir el menú lateral en un
        sidebar multinivel real.
      </p>
    </div>
  </div>

  <app-ui-button label="Nuevo" variant="primary" iconLeft="add" />
  <app-ui-button label="Editar" variant="secondary" iconLeft="edit" />
  <app-ui-button label="Eliminar" variant="danger" iconLeft="delete" />
  <app-ui-button label="Buscar" variant="ghost" iconLeft="search" />
  <app-ui-button label="Guardar cambios" variant="primary" [block]="true" />
</section>
